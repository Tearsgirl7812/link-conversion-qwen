<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Conversion - 連結轉換工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-convert {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #666;
        }

        .btn-copy {
            background: #4CAF50;
            color: white;
        }

        .output-group {
            margin-top: 20px;
        }

        .output-area {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            min-height: 120px;
            word-break: break-all;
            color: #333;
            line-height: 1.6;
        }

        .platform-info {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .platform-info h3 {
            color: #555;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .platform-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            padding: 6px 12px;
            background: white;
            border-radius: 20px;
            font-size: 12px;
            color: #666;
            border: 1px solid #e0e0e0;
        }

        .tag.facebook { border-color: #1877f2; color: #1877f2; }
        .tag.instagram { border-color: #e4405f; color: #e4405f; }
        .tag.youtube { border-color: #ff0000; color: #ff0000; }
        .tag.x { border-color: #000; color: #000; }
        .tag.threads { border-color: #0095f6; color: #0095f6; }

        .success-message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #4CAF50;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .success-message.show {
            opacity: 1;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="success-message" id="successMessage">已複製到剪貼簿！</div>

    <div class="container">
        <h1>🔗 Link Conversion</h1>
        <p class="subtitle">乾淨連結轉換工具 - 去除追蹤參數，保護隱私</p>

        <div class="input-group">
            <label for="inputLinks">輸入連結（每行一個）：</label>
            <textarea 
                id="inputLinks" 
                placeholder="請貼上需要轉換的連結&#10;例如：&#10;https://www.instagram.com/p/DZQ_TWrlCRS/?utm_source=ig_web_copy_link&#10;https://youtu.be/iRSu_af96q8?si=UpTOo8--4Ca-h8P6&#10;https://x.com/user/status/123456?s=20"
            ></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-convert" onclick="convertLinks()">轉換連結</button>
            <button class="btn-clear" onclick="clearAll()">清除</button>
        </div>

        <div class="output-group">
            <label>轉換結果：</label>
            <div class="output-area" id="outputArea">轉換後的連結將顯示在這裡...</div>
            <button class="btn-copy" onclick="copyResult()" style="margin-top: 10px; width: 100%;">複製結果</button>
        </div>

        <div class="platform-info">
            <h3>支援的平台：</h3>
            <div class="platform-tags">
                <span class="tag facebook">Facebook</span>
                <span class="tag instagram">Instagram</span>
                <span class="tag youtube">YouTube</span>
                <span class="tag x">X (Twitter)</span>
                <span class="tag threads">Threads</span>
            </div>
        </div>
    </div>

    <script>
        // 連結轉換函數
        function convertLink(url) {
            url = url.trim();
            
            if (!url) return '';

            try {
                // 確保 URL 有協議
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'https://' + url;
                }

                const parsedUrl = new URL(url);
                const hostname = parsedUrl.hostname.toLowerCase();
                const pathname = parsedUrl.pathname;
                const searchParams = parsedUrl.searchParams;

                // Facebook 轉換
                if (hostname.includes('facebook.com') || hostname.includes('fb.com')) {
                    // Facebook 的連結通常不需要特別處理，但可以移除追蹤參數
                    const cleanUrl = new URL(url);
                    cleanUrl.search = '';
                    return cleanUrl.toString();
                }

                // Instagram 轉換
                if (hostname.includes('instagram.com')) {
                    // 移除所有追蹤參數，保留基本路徑
                    const cleanUrl = new URL(url);
                    cleanUrl.search = '';
                    return cleanUrl.toString();
                }

                // YouTube 轉換
                if (hostname.includes('youtube.com') || hostname.includes('youtu.be')) {
                    if (hostname.includes('youtu.be')) {
                        // 短連結轉長連結
                        const videoId = pathname.slice(1);
                        return `https://www.youtube.com/watch?v=${videoId}`;
                    } else {
                        // 長連結，移除 si 等追蹤參數
                        const cleanUrl = new URL(url);
                        const videoId = cleanUrl.searchParams.get('v');
                        if (videoId) {
                            return `https://www.youtube.com/watch?v=${videoId}`;
                        }
                        return cleanUrl.toString();
                    }
                }

                // X (Twitter) 轉換
                if (hostname.includes('x.com') || hostname.includes('twitter.com')) {
                    const cleanUrl = new URL(url);
                    cleanUrl.search = '';
                    return cleanUrl.toString();
                }

                // Threads 轉換
                if (hostname.includes('threads.net')) {
                    const cleanUrl = new URL(url);
                    cleanUrl.search = '';
                    return cleanUrl.toString();
                }

                // 其他連結，嘗試移除常見追蹤參數
                const commonTrackingParams = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content', 'si', 's', 'fbclid', 'igsh'];
                const cleanUrl = new URL(url);
                commonTrackingParams.forEach(param => {
                    cleanUrl.searchParams.delete(param);
                });
                
                return cleanUrl.toString();

            } catch (error) {
                return '無效的連結: ' + url;
            }
        }

        // 轉換所有連結
        function convertLinks() {
            const input = document.getElementById('inputLinks').value;
            const outputArea = document.getElementById('outputArea');
            
            if (!input.trim()) {
                outputArea.innerHTML = '<span style="color: #999;">請先輸入連結...</span>';
                return;
            }

            const lines = input.split('\n');
            const convertedLinks = [];

            lines.forEach(line => {
                if (line.trim()) {
                    const converted = convertLink(line);
                    convertedLinks.push(converted);
                }
            });

            if (convertedLinks.length === 0) {
                outputArea.innerHTML = '<span style="color: #999;">沒有有效的連結可轉換</span>';
            } else {
                outputArea.textContent = convertedLinks.join('\n');
            }
        }

        // 清除所有內容
        function clearAll() {
            document.getElementById('inputLinks').value = '';
            document.getElementById('outputArea').innerHTML = '轉換後的連結將顯示在這裡...';
        }

        // 複製結果
        function copyResult() {
            const outputArea = document.getElementById('outputArea');
            const text = outputArea.textContent;
            
            if (text && text !== '轉換後的連結將顯示在這裡...' && !text.includes('請先輸入連結') && !text.includes('沒有有效的連結')) {
                navigator.clipboard.writeText(text).then(() => {
                    showMessage();
                }).catch(err => {
                    // 如果 clipboard API 失敗，使用傳統方法
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showMessage();
                });
            }
        }

        // 顯示成功訊息
        function showMessage() {
            const message = document.getElementById('successMessage');
            message.classList.add('show');
            setTimeout(() => {
                message.classList.remove('show');
            }, 2000);
        }

        // 支援按 Enter 鍵轉換（Shift+Enter 換行）
        document.getElementById('inputLinks').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                convertLinks();
            }
        });
    </script>
</body>
</html>
